name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-latest
            platform: darwin-arm64
          - os: macos-15-intel
            platform: darwin-x64
          - os: windows-latest
            platform: win32-x64
          - os: windows-11-arm
            platform: win32-arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake rpm elfutils ruby ruby-dev \
            libx11-dev libxext-dev libxtst-dev libxt-dev libxrandr-dev libxinerama-dev \
            libpipewire-0.3-dev libdbus-1-dev
          sudo gem install fpm
          echo '%__strip /bin/true' >> ~/.rpmmacros

      - name: Install dependencies
        run: npm ci

      # Build native addons with cmake-js
      - name: Build @snoop/geometry
        run: npx cmake-js compile -d packages/geometry

      - name: Build @snoop/capture
        run: npx cmake-js compile -d packages/capture

      # Copy .node files to prebuilds/<platform>-<arch>/ for distribution
      - name: Stage prebuilt binaries
        shell: bash
        run: |
          PREBUILD_DIR=${{ matrix.platform }}
          mkdir -p packages/geometry/prebuilds/$PREBUILD_DIR
          mkdir -p packages/capture/prebuilds/$PREBUILD_DIR
          cp packages/geometry/build/Release/*.node packages/geometry/prebuilds/$PREBUILD_DIR/
          cp packages/capture/build/Release/*.node packages/capture/prebuilds/$PREBUILD_DIR/

      # Rebuild native addons for Electron's Node version
      - name: Rebuild native addons for Electron
        run: npx @electron/rebuild --only @snoop/geometry,@snoop/capture
        working-directory: app

      # electron-builder can't follow workspace symlinks that point outside app/.
      # Copy workspace packages into app/node_modules/ as real directories.
      - name: Prepare workspace dependencies
        shell: bash
        run: |
          rm -rf app/node_modules
          rm -f node_modules/snoop
          rm -rf node_modules/@snoop
          cp -r node_modules app/node_modules
          rm -rf app/node_modules/.bin
          mkdir -p app/node_modules/@snoop
          cp -rL packages/geometry app/node_modules/@snoop/geometry
          cp -rL packages/capture app/node_modules/@snoop/capture

      - name: Build distributables
        run: npm run dist -w app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_SYSTEM_FPM: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snoop-${{ matrix.platform }}
          path: |
            app/out/*.zip
            app/out/*.dmg
            app/out/*.deb
            app/out/*.rpm
            app/out/*.AppImage
            app/out/*.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
