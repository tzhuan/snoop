name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-latest
            platform: darwin-arm64
          - os: macos-15-intel
            platform: darwin-x64
          - os: windows-latest
            platform: win32-x64
          - os: windows-11-arm
            platform: win32-arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Linux: cmake, native addon deps, and packaging tools
      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake rpm elfutils \
            libx11-dev libxext-dev libxtst-dev libxt-dev libxrandr-dev libxinerama-dev \
            libpipewire-0.3-dev libdbus-1-dev
          echo '%__strip /bin/true' >> ~/.rpmmacros

      - name: Install dependencies
        run: npm ci

      # Build native addons with cmake-js
      - name: Build @snoop/active-window
        run: npx cmake-js compile -d packages/active-window

      - name: Build @snoop/capture
        run: npx cmake-js compile -d packages/capture

      # Copy .node files to prebuilds/<platform>-<arch>/ for distribution
      - name: Stage prebuilt binaries
        shell: bash
        run: |
          PREBUILD_DIR=${{ matrix.platform }}
          mkdir -p packages/active-window/prebuilds/$PREBUILD_DIR
          mkdir -p packages/capture/prebuilds/$PREBUILD_DIR
          cp packages/active-window/build/Release/*.node packages/active-window/prebuilds/$PREBUILD_DIR/
          cp packages/capture/build/Release/*.node packages/capture/prebuilds/$PREBUILD_DIR/

      # Rebuild native addons for Electron's Node version
      - name: Rebuild native addons for Electron
        run: npx electron-rebuild -w @snoop/active-window @snoop/capture
        working-directory: app

      # Workspace hoisting puts deps at root node_modules/, but electron-forge
      # only packages app/. Copy all dependencies into app/node_modules/
      # so the full dependency tree is resolvable from the asar.
      # electron-forge needs all deps resolvable from app/ for the dependency
      # walk, and runtime deps must be in the asar. Copy root node_modules
      # into app/ (preserving symlinks for speed), then replace @snoop
      # workspace symlinks with real copies that include native addons.
      - name: Prepare app dependencies for packaging
        shell: bash
        run: |
          rm -rf app/node_modules
          # Remove circular/workspace symlinks before copying
          rm -f node_modules/snoop
          rm -rf node_modules/@snoop
          cp -r node_modules app/node_modules
          rm -rf app/node_modules/.bin
          mkdir -p app/node_modules/@snoop
          cp -rL packages/active-window app/node_modules/@snoop/active-window
          cp -rL packages/capture app/node_modules/@snoop/capture

      - name: Build (make)
        run: npm run make -w app

      - name: Collect distributable files
        shell: bash
        run: |
          mkdir -p dist
          find app/out/make -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snoop-${{ matrix.platform }}
          path: dist/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
